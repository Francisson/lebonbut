<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitre Rummikub - Photo OCR - Le Bon Jeu</title>
    
    <!-- Liaison avec ton fichier CSS existant -->
    <link rel="stylesheet" href="style.css">

    <!-- Chargement de Tesseract.js pour l'OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        .rummikub-card {
            background-color: #1a2236;
            border: 1px solid #2a3650;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Style pour masquer l'input type file moche et le remplacer par un joli bouton */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-choose-file {
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #2e3d61;
            color: #ffffff;
            border: 1px solid #3a4a6e;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-choose-file:hover {
            background-color: #3a4a6e;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Aperçu de la photo prise */
        #img-preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #2a3650;
            display: none;
        }

        .result-display {
            margin-top: 15px;
            padding: 15px;
            background-color: #101624;
            border-radius: 8px;
            border: 1px solid #2a3650;
            font-size: 0.95rem;
            text-align: left;
        }

        .score-total {
            font-size: 1.8rem;
            font-weight: bold;
            color: #e74c3c;
            margin: 5px 0 0 0;
        }

        .liste-tuiles {
            color: #bdc3c7;
            font-style: italic;
        }

        #status-ocr {
            font-size: 0.9rem;
            color: #bdc3c7;
            margin-top: 10px;
            font-style: italic;
        }

        /* Badges de couleur pour l'affichage des tuiles */
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            margin: 2px;
            color: #fff;
        }
        .badge-rouge { background-color: #e74c3c; }
        .badge-bleu { background-color: #2980b9; }
        .badge-noir { background-color: #2c3e50; border: 1px solid #bdc3c7; }
        .badge-jaune { background-color: #f1c40f; color: #333; }
        .badge-joker { background-color: #9b59b6; }
    </style>
</head>
<body>

    <header>
        <h1>🧩 Arbitre Rummikub <span class="subtitle">- Photo OCR</span></h1>
    </header>

    <main>
        <p class="welcome-text">Prenez une photo bien nette de vos tuiles restantes (alignées ou côte à côte).</p>

        <div class="rummikub-card">
            <div class="file-input-wrapper">
                <button class="btn-choose-file">📸 Prendre une photo / Image</button>
                <!-- L'attribut capture="environment" force l'ouverture directe de l'appareil photo arrière sur mobile -->
                <input type="file" id="file-selector" accept="image/*" capture="environment" onchange="analyserPhoto(event)">
            </div>

            <div id="status-ocr">En attente d'une photo...</div>
            
            <img id="img-preview" alt="Aperçu du chevalet">
            
            <div style="margin-top: 15px;">
                <button onclick="ajouterJoker()" style="padding: 8px 15px; background: #212a42; border: 1px solid #2a3650; color: white; border-radius: 6px; cursor: pointer;">+ Ajouter Joker manuel</button>
                <button onclick="reinitialiser()" style="padding: 8px 15px; background: #212a42; border: 1px solid #2a3650; color: white; border-radius: 6px; cursor: pointer; margin-left: 10px;">Vider</button>
            </div>
        </div>

        <div class="rummikub-card">
            <div class="result-display">
                <strong>Tuiles détectées :</strong>
                <div class="liste-tuiles" id="tuiles-scannees">Aucune tuile pour le moment</div>
            </div>
            
            <div class="result-display" style="text-align: center;">
                <strong>TOTAL PENALITE</strong>
                <p class="score-total"><span id="total-points">0</span> pts</p>
            </div>
        </div>

        <div class="back-nav">
            <a href="index.html" class="back-link">⬅ Retour à l'accueil</a>
        </div>
    </main>

    <footer>
        Le Bon Jeu © Famille - Prêt pour la partie
    </footer>

    <!-- Canvas invisible pour manipuler l'image et analyser les couleurs des pixels -->
    <canvas id="canvas-analyse" style="display:none;"></canvas>

    <script>
        let listeTuilesScannees = [];
        let totalPoints = 0;

        const imgPreview = document.getElementById('img-preview');
        const txtTuiles = document.getElementById('tuiles-scannees');
        const txtTotal = document.getElementById('total-points');
        const statusOcr = document.getElementById('status-ocr');
        const canvas = document.getElementById('canvas-analyse');
        const ctx = canvas.getContext('2d');

        async function analyserPhoto(event) {
            const fichier = event.target.files[0];
            if (!fichier) return;

            statusOcr.innerText = "Chargement de l'image...";
            
            // Afficher l'aperçu de la photo
            imgPreview.src = URL.createObjectURL(fichier);
            imgPreview.style.display = "inline-block";

            // Attendre que l'image charge en mémoire pour la copier dans le canvas
            imgPreview.onload = async () => {
                canvas.width = imgPreview.naturalWidth;
                canvas.height = imgPreview.naturalHeight;
                ctx.drawImage(imgPreview, 0, 0);

                statusOcr.innerText = "Analyse du texte et des chiffres (OCR)...";

                try {
                    // Initialiser le worker Tesseract
                    const worker = await Tesseract.createWorker('fra');
                    
                    // On configure pour chercher uniquement des chiffres (gros gain de précision)
                    await worker.setParameters({
                        tessedit_char_whitelist: '0123456789 ',
                    });

                    // Demander à Tesseract de nous renvoyer les mots ET leurs positions (coordonnées x, y)
                    const { data } = await worker.recognize(canvas);
                    await worker.terminate();

                    statusOcr.innerText = "Analyse des couleurs...";
                    
                    // Filtrer et traiter les chiffres trouvés
                    let tuilesTrouveesSurCettePhoto = [];

                    data.words.forEach(word => {
                        const chiffre = parseInt(word.text.trim(), 10);
                        
                        // Si c'est un chiffre valide du Rummikub
                        if (!isNaN(chiffre) && chiffre >= 1 && chiffre <= 13) {
                            
                            // On extrait la couleur dominante autour de ce chiffre grâce au Canvas
                            const couleurDetectee = determinerCouleurPixel(word.bbox);
                            
                            tuilesTrouveesSurCettePhoto.push({
                                chiffre: chiffre,
                                couleur: couleurDetectee
                            });
                        }
                    });

                    if(tuilesTrouveesSurCettePhoto.length > 0) {
                        enregistrerTuiles(tuilesTrouveesSurCettePhoto);
                        statusOcr.innerText = `✅ Analyse terminée ! ${tuilesTrouveesSurCettePhoto.length} tuiles détectées.`;
                    } else {
                        statusOcr.innerText = "⚠️ Aucun chiffre lisible détecté. Prenez la photo de plus près.";
                    }

                } catch (error) {
                    console.error(error);
                    statusOcr.innerText = "💥 Erreur pendant l'analyse.";
                }
            };
        }

        // Algorithme d'analyse de couleur basé sur la boîte englobante (bbox) renvoyée par l'OCR
        function determinerCouleurPixel(bbox) {
            // On prend un échantillon de pixels au centre de la zone où le chiffre a été trouvé
            const centerX = Math.floor(bbox.x0 + (bbox.x1 - bbox.x0) / 2);
            const centerY = Math.floor(bbox.y0 + (bbox.y1 - bbox.y0) / 2);
            
            const pixelData = ctx.getImageData(centerX, centerY, 1, 1).data;
            const r = pixelData[0];
            const g = pixelData[1];
            const b = pixelData[2];

            // Logique de décision basique (Seuils de couleurs RVB)
            if (r > 150 && g < 80 && b < 80) return "rouge";
            if (r < 80 && g < 120 && b > 140) return "bleu";
            if (r > 150 && g > 130 && b < 50) return "jaune";
            
            // Si c'est très sombre, c'est du noir
            if (r < 80 && g < 80 && b < 80) return "noir"; 
            
            return "noir"; // Par défaut si incertain
        }

        function enregistrerTuiles(nouvellesTuiles) {
            nouvellesTuiles.forEach(tuile => {
                listeTuilesScannees.push(tuile);
                totalPoints += tuile.chiffre;
            });
            mettreAJourAffichage();
        }

        function ajouterJoker() {
            listeTuilesScannees.push({ chiffre: 30, couleur: "joker" });
            totalPoints += 30;
            mettreAJourAffichage();
            statusOcr.innerText = "🃏 Joker manuel ajouté (+30 pts)";
        }

        function mettreAJourAffichage() {
            if (listeTuilesScannees.length === 0) {
                txtTuiles.innerHTML = "Aucune tuile pour le moment";
            } else {
                txtTuiles.innerHTML = "";
                listeTuilesScannees.forEach(t => {
                    const label = t.couleur === "joker" ? "Joker" : t.chiffre;
                    txtTuiles.innerHTML += `<span class="badge badge-${t.couleur}">${label}</span> `;
                });
            }
            txtTotal.innerText = totalPoints;
        }

        function reinitialiser() {
            listeTuilesScannees = [];
            totalPoints = 0;
            imgPreview.style.display = "none";
            imgPreview.src = "";
            mettreAJourAffichage();
            statusOcr.innerText = "En attente d'une photo...";
        }
    </script>
</body>
</html>
