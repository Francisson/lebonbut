<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitre Rummikub - Le Bon Jeu</title>
    
    <!-- Liaison avec ton fichier CSS existant -->
    <link rel="stylesheet" href="style.css">

    <!-- Chargement de Tesseract.js pour l'OCR (Reconnaissance de texte) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        /* Style spécifique à la caméra et aux scores */
        .rummikub-card {
            background-color: #1a2236;
            border: 1px solid #2a3650;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        #camera-wrapper {
            position: relative;
            margin: 0 auto 20px auto;
            max-width: 100%;
            width: 400px;
            border: 2px solid #2a3650;
            border-radius: 8px;
            overflow: hidden;
            background-color: #101624;
            aspect-ratio: 4/3;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Viseur pour aider l'utilisateur à centrer la tuile */
        .viseur {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 110px;
            border: 3px dashed #2ecc71;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
        }

        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .action-group button {
            flex: 1;
            min-width: 130px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #212a42;
            color: #ffffff;
            border: 1px solid #2a3650;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-group button:hover:not(:disabled) {
            background-color: #2a3650;
            border-color: #3a4a6e;
        }

        .action-group button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #btn-scan {
            background-color: #2e3d61;
            border-color: #3a4a6e;
        }
        #btn-scan:hover:not(:disabled) {
            background-color: #3a4a6e;
        }

        .result-display {
            margin-top: 15px;
            padding: 15px;
            background-color: #101624;
            border-radius: 8px;
            border: 1px solid #2a3650;
            font-size: 0.95rem;
            line-height: 1.5;
            text-align: left;
        }

        .score-total {
            font-size: 1.8rem;
            font-weight: bold;
            color: #e74c3c;
            margin: 5px 0 0 0;
        }

        .liste-tuiles {
            color: #bdc3c7;
            font-style: italic;
            word-wrap: break-word;
            margin: 5px 0 0 0;
        }

        /* Petit statut de chargement pendant que l'OCR réfléchit */
        #status-ocr {
            font-size: 0.9rem;
            color: #bdc3c7;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>🧩 Arbitre Rummikub <span class="subtitle">- Scan OCR</span></h1>
    </header>

    <main>
        <p class="welcome-text">Placez une tuile dans le cadre vert et cliquez sur "Scanner".</p>

        <div class="rummikub-card">
            <div id="camera-wrapper">
                <video id="video" autoplay playsinline></video>
                <div class="viseur"></div>
            </div>

            <div id="status-ocr">Prêt à scanner</div>

            <div class="action-group" style="margin-top: 15px;">
                <button id="btn-start" onclick="demarrerCamera()">Activer la caméra</button>
                <button id="btn-scan" onclick="scannerTuile()" disabled>Scanner la tuile</button>
                <button id="btn-joker" onclick="ajouterJoker()" disabled>+ Ajouter Joker</button>
                <button id="btn-clear" onclick="reinitialiser()">Vider</button>
            </div>
        </div>

        <div class="rummikub-card">
            <div class="result-display">
                <strong>Tuiles enregistrées :</strong>
                <p class="liste-tuiles" id="tuiles-scannees">Aucune tuile sur le chevalet</p>
            </div>
            
            <div class="result-display" style="text-align: center;">
                <strong>TOTAL PENALITE</strong>
                <p class="score-total"><span id="total-points">0</span> pts</p>
            </div>
        </div>

        <div class="back-nav">
            <a href="index.html" class="back-link">⬅ Retour à l'accueil</a>
        </div>
    </main>

    <footer>
        Le Bon Jeu © Famille - Prêt pour la partie
    </footer>

    <!-- Canvas caché servant à capturer la photo pour l'OCR -->
    <canvas id="canvas-capture" style="display:none;" width="400" height="300"></canvas>

    <script type="text/javascript">
        let fluxVideo = null;
        let listeTuilesScannees = [];
        let totalPoints = 0;
        let ocrWorker = null;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas-capture');
        const btnStart = document.getElementById('btn-start');
        const btnScan = document.getElementById('btn-scan');
        const btnJoker = document.getElementById('btn-joker');
        const txtTuiles = document.getElementById('tuiles-scannees');
        const txtTotal = document.getElementById('total-points');
        const statusOcr = document.getElementById('status-ocr');

        // Initialisation de la caméra
        async function demarrerCamera() {
            btnStart.disabled = true;
            statusOcr.innerText = "Initialisation de la caméra...";

            try {
                fluxVideo = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 }
                });
                video.srcObject = fluxVideo;
                
                // Préparer le moteur Tesseract à l'avance pour éviter la latence au premier scan
                statusOcr.innerText = "Chargement du moteur de lecture...";
                ocrWorker = await Tesseract.createWorker('eng'); // 'eng' ou 'fra' fonctionnent bien pour les chiffres
                
                // Configurer Tesseract pour qu'il ne cherche QUE des chiffres (gros gain de précision !)
                await ocrWorker.setParameters({
                    tessedit_char_whitelist: '0123456789',
                });

                statusOcr.innerText = "Caméra prête. Placez le chiffre dans le viseur.";
                btnStart.style.display = "none";
                btnScan.disabled = false;
                btnJoker.disabled = false;
            } catch (error) {
                alert("Impossible d'accéder à la caméra : " + error);
                btnStart.disabled = false;
                btnStart.innerText = "Activer la caméra";
                statusOcr.innerText = "Erreur de caméra.";
            }
        }

        // Capture et Analyse OCR
        async function scannerTuile() {
            if (!fluxVideo || !ocrWorker) return;

            btnScan.disabled = true;
            statusOcr.innerText = "Lecture en cours... Ne bougez pas";

            // Dessiner l'image de la vidéo sur le canvas caché
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                // Lancer la reconnaissance sur le canvas capturé
                const { data: { text } } = await ocrWorker.recognize(canvas);
                
                // Nettoyer le texte trouvé (ne garder que les chiffres)
                const chiffreExtrait = text.trim();
                const valeur = parseInt(chiffreExtrait, 10);

                // Vérifier si c'est un chiffre valide au Rummikub (entre 1 et 13)
                if (!isNaN(valeur) && valeur >= 1 && valeur <= 13) {
                    ajouterPoints(valeur, `Tuile ${valeur}`);
                    statusOcr.innerText = `✅ Tuile ${valeur} détectée !`;
                } else {
                    statusOcr.innerText = `❌ Impossible de lire un chiffre valide (Trouvé : "${chiffreExtrait}")`;
                }
            } catch (err) {
                console.error(err);
                statusOcr.innerText = "💥 Erreur lors de l'analyse de l'image.";
            }

            btnScan.disabled = false;
        }

        function ajouterPoints(valeur, texteAffichage) {
            listeTuilesScannees.push(texteAffichage);
            totalPoints += valeur;

            txtTuiles.innerText = listeTuilesScannees.join(', ');
            txtTotal.innerText = totalPoints;
        }

        // Gérer le joker à part (comme il n'a pas de chiffre écrit, un bouton manuel est parfait)
        function ajouterJoker() {
            ajouterPoints(30, "Joker (30)");
            statusOcr.innerText = "🃏 Joker ajouté (+30 pts)";
        }

        function reinitialiser() {
            listeTuilesScannees = [];
            totalPoints = 0;
            txtTuiles.innerText = "Aucune tuile sur le chevalet";
            txtTotal.innerText = "0";
            statusOcr.innerText = "Chevalet vidé.";
        }
    </script>
</body>
</html>
